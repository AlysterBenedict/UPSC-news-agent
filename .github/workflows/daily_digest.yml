name: UPSC Daily Digest

on:
  schedule:
    # Run daily at 16:30 UTC (which is 10:00 PM IST / India Standard Time)
    - cron: '30 16 * * *'
  workflow_dispatch:
    # Allows manual trigger of the workflow from the Actions tab

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          # We cache pip packages so they only install/download from the internet once.
          # Subsequent runs load them directly from the GitHub Action cache.
          cache-dependency-path: 'upsc-agent/requirements.txt'

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libffi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests
          pip install -r upsc-agent/requirements.txt
          echo "=== Installed Python Packages ==="
          pip list

      - name: Run UPSC News Scraper & Digest Agent
        env:
          # NVIDIA NIM API Settings
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          NIM_BASE_URL: https://integrate.api.nvidia.com/v1
          NIM_MODEL: nvidia/llama-3.3-nemotron-super-49b-v1

          # Email/SMTP Settings
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}

          # App Paths & Settings (Matches configuration inside upsc-agent)
          SCRAPER_OUTPUT_DIR: ../zartifacts
          OUTPUT_DIR: ./output
          DATA_DIR: ./data
          DB_PATH: ./data/checkpoints.db
        run: |
          cd upsc-agent
          python main.py run --send-email
